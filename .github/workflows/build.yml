name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip python3-setuptools git zip unzip openjdk-17-jdk
        sudo apt install -y libffi-dev libssl-dev liblzma-dev zlib1g-dev

    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install cython buildozer

    - name: Install Android SDK/NDK
      run: |
        sudo apt install -y wget
        buildozer android debug || true

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MyMonitorApp
        path: bin/*.apk