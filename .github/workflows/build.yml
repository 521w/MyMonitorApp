name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Fix directory name
        run: |
          if [ -d " tabs" ]; then
            mv " tabs" tabs
            echo "Fixed: ' tabs' -> 'tabs'"
          fi
          rm -f tabs.process.py

      - name: Download Chinese font
        run: |
          echo "Downloading Chinese font..."
          wget -q "https://github.com/notofonts/noto-cjk/releases/download/Sans2.004/03_NotoSansCJKsc-Regular.otf" -O chinese.ttf && echo "Downloaded NotoSansCJKsc" || \
          wget -q "https://cdn.jsdelivr.net/gh/SolidZORO/zpix-pixel-font@master/dist/zpix.ttf" -O chinese.ttf && echo "Downloaded zpix" || \
          echo "WARNING: Could not download font, will rely on system fonts"
          ls -la chinese.ttf 2>/dev/null || true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-v6-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-v6-

      - name: Install Android SDK Platform 33
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "platform-tools"

      - name: Fix sdkmanager path for Buildozer
        run: |
          mkdir -p $ANDROID_HOME/tools/bin
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager $ANDROID_HOME/tools/bin/avdmanager

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf automake libtool pkg-config cmake \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            libffi-dev libssl-dev liblzma-dev \
            build-essential ccache \
            autopoint gettext

      - name: Install buildozer
        run: pip install buildozer cython==0.29.34

      - name: Build APK
        run: yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyMonitorApp
          path: bin/*.apk