name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip \
          python3-pip python3-virtualenv python3-dev \
          autoconf automake libtool pkg-config cmake \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
          libffi-dev libssl-dev \
          build-essential ccache \
          autopoint gettext

    - name: Install Rust
      run: |
        curl https://sh.rustup.rs -sSf | sh -s -- -y
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Set up Python venv and install buildozer
      run: |
        python3 -m virtualenv venv
        source venv/bin/activate
        pip install --upgrade pip setuptools
        pip install buildozer cython==0.29.34
        echo "$PWD/venv/bin" >> $GITHUB_PATH

    - name: Build APK
      run: |
        source venv/bin/activate
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MyMonitorApp
        path: bin/*.apk